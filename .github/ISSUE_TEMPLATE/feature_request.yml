name: Feature request
description: Suggest an improvement for the template
title: "feat: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Please describe the problem and the desired outcome.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem does this solve for organizers or attendees?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe your preferred solution.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: constraints
    attributes:
      label: Constraints acknowledged
      options:
        - label: This project should remain static-host friendly (no required backend).
          required: true
        - label: I checked existing issues and discussions for duplicates.
          required: true
