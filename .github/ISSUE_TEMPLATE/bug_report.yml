name: Bug report
description: Report a reproducible problem with the certificate generator
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. Please provide enough detail so the issue can be reproduced.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: A short, clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List exact steps so we can reproduce reliably.
      placeholder: |
        1. Open ...
        2. Enter ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: page_url
    attributes:
      label: URL tested
      description: Include the full URL including query params when relevant.
      placeholder: https://example.github.io/certificate-generator/?id=...
  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: Chrome 123, Firefox 124, Safari 17.4
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Logs, screenshots, or related details.
